<!DOCTYPE html>
<html>
  <head>
    <title>Zylkfar – Register Interest</title>
    <style>
      body {
        background-color: #1a0026;
        color: #ffffff;
        font-family: Arial, sans-serif;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        margin: 0;
      }
      .card {
        background: rgba(0, 0, 0, 0.35);
        padding: 24px 28px;
        border-radius: 10px;
        max-width: 380px;
        width: 100%;
      }
      h1 {
        font-size: 1.8rem;
        margin-bottom: 12px;
        text-align: center;
      }
      label {
        display: block;
        font-size: 0.9rem;
        margin-top: 10px;
        margin-bottom: 4px;
      }
      input, textarea {
        width: 100%;
        padding: 8px 10px;
        border-radius: 6px;
        border: none;
        font-family: inherit;
        font-size: 0.95rem;
      }
      button {
        margin-top: 14px;
        width: 100%;
        padding: 10px;
        border-radius: 6px;
        border: none;
        background: #7b3fe4;
        color: #fff;
        font-weight: 600;
        cursor: pointer;
      }
      button:hover {
        background: #9a63ff;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <h1>Register your interest</h1>
      <form action="https://formspree.io/f/mbdvlokw" method="POST">
        <label for="name">Name</label>
        <input id="name" name="name" type="text" required />

        <label for="email">Email</label>
        <input id="email" name="email" type="email" required />

        <label for="message">Why are you interested in Zylkfar?</label>
        <textarea id="message" name="message" rows="3"></textarea>

        <button type="submit">Submit interest</button>
      </form>
    </div>
  </body>
</html>
